# /home/mohsin/hack/rollout_override.yaml
device: cuda # Change to cuda once your GPU driver is updated
policy:
  type: smolvla
  pretrained_path: "/home/mohsin/hack/smolvla_wrist_only/checkpoints/015000/pretrained_model"
  input_features:
    observation.images.wrist_cam:
      type: "VISUAL"
      shape: [3, 224, 224]
  output_features:
    action:
      type: "ACTION"
      shape: [6]
robot:
  type: so101_follower
  port: /dev/ttyACM0
  cameras:
    wrist_cam:
      type: opencv
      index_or_path: 0
      width: 640
      height: 480
      fps: 30
      backend: V4L2
